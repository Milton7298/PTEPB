<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>屏東縣非法棄置智慧圍籬系統 - 監控點管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; }
        .sidebar { width: 320px; background: white; border-right: 1px solid #dee2e6; height: 100vh; overflow-y: auto; }
        .content-area { padding: 20px; }
        .tree-branch { border-left: 3px solid #198754; margin-left: 20px; padding-left: 20px; }
        .card-cam { border: 1px solid #dee2e6; margin-bottom: 10px; border-radius: 8px; }
        .status-ok { color: #198754; }
        .status-err { color: #dc3545; }
    </style>
</head>
<body>

<div class="d-flex">
    <!-- 左側選單 -->
    <div class="sidebar">
        <div class="p-3 border-bottom d-flex justify-content-between">
            <h6 class="fw-bold">監控點位列表</h6>
            <button class="btn btn-sm btn-primary"><i class="fas fa-plus"></i> 新增</button>
        </div>
        <div id="sidebarList" class="list-group list-group-flush"></div>
    </div>

    <!-- 右側內容 -->
    <div class="content-area w-100">
        <div class="card p-4 shadow-sm mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h4 class="fw-bold" id="viewName">點位名稱</h4>
                    <span class="badge bg-dark font-monospace" id="viewID">ID</span>
                    <div class="mt-2 text-muted small" id="viewInfo"></div>
                </div>
                <button class="btn btn-outline-primary" onclick="openEditModal()"><i class="fas fa-edit"></i> 維護</button>
            </div>
        </div>
        <div class="tree-branch" id="cameraList"></div>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="dataModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">監控點位與攝影機維護</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <div id="modalContent"></div>
            </div>
            <div class="modal-footer"><button class="btn btn-primary" onclick="saveData()">儲存變更</button></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let monitorData = [{ id: "LOCA_68000_2026_0001", name: "國道10號里港交流道", lat: 22.7834, lng: 120.4932, cameras: [{n:"車頭", id:"C1", on:true}, {n:"車斗", id:"C2", on:true}, {n:"車尾", id:"C3", on:false}] }];
    
    function render() {
        const item = monitorData[0];
        document.getElementById('viewName').innerText = item.name;
        document.getElementById('viewID').innerText = item.id;
        document.getElementById('viewInfo').innerHTML = `<i class="fas fa-map-marker-alt"></i> ${item.lat}, ${item.lng} | <i class="fas fa-clock"></i> 失聯告警: 30 分鐘`;
        
        document.getElementById('sidebarList').innerHTML = `<button class="list-group-item list-group-item-action active">${item.name}</button>`;
        
        document.getElementById('cameraList').innerHTML = item.cameras.map((c, i) => `
            <div class="card card-cam p-3">
                <div class="row align-items-center">
                    <div class="col-3"><strong>${c.n}攝影機</strong><br><small class="font-monospace">${c.id}</small></div>
                    <div class="col-3 text-center">${c.n}視角</div>
                    <div class="col-3 text-center ${c.on ? 'status-ok' : 'status-err'}"><i class="fas fa-wifi"></i> ${c.on ? '正常' : '異常'}</div>
                    <div class="col-3 text-end"><span class="badge bg-primary">啟用</span></div>
                </div>
            </div>
        `).join('');
    }

    window.openEditModal = function() {
        const item = monitorData[0];
        document.getElementById('modalContent').innerHTML = `
            <div class="row g-3 mb-4">
                <div class="col-6"><label>點位編號</label><input type="text" class="form-control" id="mID" value="${item.id}" readonly></div>
                <div class="col-6"><label>地點名稱</label><input type="text" class="form-control" id="mName" value="${item.name}"></div>
            </div>
            ${item.cameras.map((c, i) => `
                <div class="row mb-2 align-items-center bg-light p-2 rounded">
                    <div class="col-2">${c.n}</div>
                    <div class="col-5"><input type="text" class="form-control" id="cID${i}" value="${c.id}"></div>
                    <div class="col-5"><input type="checkbox" ${c.on?'checked':''}> 連線 <input type="checkbox" checked> 啟用</div>
                </div>
            `).join('')}`;
        new bootstrap.Modal(document.getElementById('dataModal')).show();
    };

    window.saveData = function() {
        monitorData[0].name = document.getElementById('mName').value;
        render();
        bootstrap.Modal.getInstance(document.getElementById('dataModal')).hide();
    };

    document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
