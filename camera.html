<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>屏東縣非法棄置智慧圍籬系統 - 攝影機進階管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; }
        .sidebar { width: 320px; background: white; border-right: 1px solid #dee2e6; height: 100vh; overflow-y: auto; }
        .list-group-item { cursor: pointer; border-left: 4px solid transparent; color: #6c757d; }
        /* 修正選取時字體顏色不變 */
        .list-group-item.active { background-color: #e9ecef; border-left-color: #0d6efd; color: #6c757d !important; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .tree-line { border-left: 2px solid #dee2e6; margin-left: 20px; padding-left: 20px; }
        .cam-card { border: 1px solid #dee2e6; margin-bottom: 10px; padding: 15px; border-radius: 5px; background: white; border-left: 5px solid #198754; }
        .site-id-badge { font-size: 0.75rem; padding: 0.2rem 0.5rem; }
        .view-angle-badge { background: #f0f0f0; color: #333; padding: 2px 8px; border-radius: 4px; font-size: 0.85rem; }
    </style>
</head>
<body>
<div class="d-flex">
    <div class="sidebar">
        <div class="p-3 border-bottom d-flex justify-content-between">
            <h6 class="fw-bold">監控點位列表</h6>
            <button class="btn btn-sm btn-primary"><i class="fas fa-plus"></i> 新增</button>
        </div>
        <div id="sidebarList" class="list-group list-group-flush"></div>
    </div>

    <div class="flex-grow-1 p-4">
        <div class="card p-4 shadow-sm mb-4">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <h4 class="fw-bold" id="viewName"></h4>
                    <span class="badge bg-dark font-monospace site-id-badge" id="viewID"></span>
                    <div class="mt-2 text-muted small" id="viewInfo"></div>
                </div>
                <button class="btn btn-outline-primary btn-sm" onclick="openEditModal()"><i class="fas fa-edit"></i> 維護</button>
            </div>
        </div>
        
        <h6 class="mb-3 fw-bold"><i class="fas fa-project-diagram"></i> 設備狀態監控 (3 機配置)</h6>
        <div class="tree-line" id="cameraStatusArea"></div>
    </div>
</div>

<!-- 維護 Modal -->
<div class="modal fade" id="dataModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">監控點位與攝影機維護</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <div id="modalInputs"></div>
            </div>
            <div class="modal-footer"><button type="button" class="btn btn-primary" onclick="saveData()">儲存變更</button></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let monitorData = [
        { id: "LOCA_68000_2026_0001", name: "國道10號里港交流道(里港鄉)", lat: 22.7834, lng: 120.4932, active: true, cams: [{n:"車頭攝影機", v:"車頭視角", id:"LOCA_68000_2026_0001_Front_01", on:true}, {n:"車斗攝影機", v:"車斗視角", id:"LOCA_68000_2026_0001_Bed_01", on:true}, {n:"車尾攝影機", v:"車尾視角", id:"LOCA_68000_2026_0001_Rear_01", on:false}] },
        { id: "LOCA_68000_2026_0002", name: "建國路與大溪路口(屏東市)", lat: 22.6789, lng: 120.4856, active: true, cams: [{n:"車頭攝影機", v:"車頭視角", id:"LOCA_68000_2026_0002_Front_01", on:true}, {n:"車斗攝影機", v:"車斗視角", id:"LOCA_68000_2026_0002_Bed_01", on:true}, {n:"車尾攝影機", v:"車尾視角", id:"LOCA_68000_2026_0002_Rear_01", on:true}] },
        { id: "LOCA_68000_2026_0003", name: "沿山公路(高樹段)(高樹鄉)", lat: 22.8543, lng: 120.6124, active: true, cams: [{n:"車頭攝影機", v:"車頭視角", id:"LOCA_68000_2026_0003_Front_01", on:true}, {n:"車斗攝影機", v:"車斗視角", id:"LOCA_68000_2026_0003_Bed_01", on:true}, {n:"車尾攝影機", v:"車尾視角", id:"LOCA_68000_2026_0003_Rear_01", on:true}] }
    ];
    let currentIndex = 0;
    const dataModal = new bootstrap.Modal(document.getElementById('dataModal'));

    function render(idx = 0) {
        currentIndex = idx;
        const item = monitorData[idx];
        document.getElementById('viewName').innerText = item.name;
        document.getElementById('viewID').innerText = item.id;
        document.getElementById('viewInfo').innerHTML = `<i class="fas fa-map-marker-alt"></i> ${item.lat}, ${item.lng} | <i class="fas fa-clock"></i> 失聯告警: 30 分鐘`;
        
        document.getElementById('sidebarList').innerHTML = monitorData.map((d, i) => 
            `<button class="list-group-item ${i===idx?'active':''}" onclick="render(${i})">
                <div class="d-flex justify-content-between small">${d.id} <span class="status-dot ${d.active?'bg-success':'bg-secondary'}"></span></div>
                <strong>${d.name}</strong>
             </button>`).join('');

        document.getElementById('cameraStatusArea').innerHTML = item.cams.map(c => `
            <div class="cam-card row align-items-center">
                <div class="col-4"><strong>${c.n}</strong><br><small class="font-monospace text-muted">${c.id}</small></div>
                <div class="col-3 text-center"><span class="view-angle-badge">${c.v}</span></div>
                <div class="col-3 text-center ${c.on?'text-success':'text-danger'}"><i class="fas fa-wifi"></i> ${c.on?'正常':'異常'}</div>
                <div class="col-2 text-end"><span class="badge bg-primary">啟用</span></div>
            </div>`).join('');
    }

    window.openEditModal = function() {
        const item = monitorData[currentIndex];
        document.getElementById('modalInputs').innerHTML = `
            <div class="row g-3 mb-4">
                <div class="col-6"><label class="form-label">點位編號</label><input type="text" class="form-control" value="${item.id}" readonly></div>
                <div class="col-6"><label class="form-label">地點名稱</label><input type="text" class="form-control" id="mName" value="${item.name}"></div>
            </div>
            ${item.cams.map((c, i) => `<div class="row mb-2 align-items-center bg-light p-2 rounded border">
                <div class="col-3 fw-bold">${c.n}</div>
                <div class="col-5"><input type="text" class="form-control form-control-sm" id="cID${i}" value="${c.id}"></div>
                <div class="col-4"><input type="checkbox" ${c.on?'checked':''}> 連線 <input type="checkbox" checked> 啟用</div>
            </div>`).join('')}`;
        dataModal.show();
    };

    window.saveData = function() {
        monitorData[currentIndex].name = document.getElementById('mName').value;
        for(let i=0; i<3; i++) monitorData[currentIndex].cams[i].id = document.getElementById(`cID${i}`).value;
        dataModal.hide();
        render(currentIndex);
    };
    document.addEventListener('DOMContentLoaded', () => render());
</script>
</body>
</html>
