<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>屏東縣非法棄置智慧圍籬系統 - 即時影像監控</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .header-section { background-color: #2c3e50; color: white; padding: 15px 0; flex-shrink: 0; }
        .main-container { flex-grow: 1; display: flex; overflow: hidden; }
        .sidebar { width: 340px; background: white; border-right: 1px solid #dee2e6; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid #dee2e6; background-color: #f1f3f5; }
        .list-group-scroll { overflow-y: auto; flex-grow: 1; }
        .camera-group-title { font-size: 0.85rem; font-weight: bold; padding: 10px 15px; background-color: #f8f9fa; color: #6c757d; border-bottom: 1px solid #dee2e6; }
        .list-group-item { border: none; border-bottom: 1px solid #f1f1f1; cursor: pointer; padding-left: 20px; transition: 0.2s; }
        .list-group-item:hover { background-color: #e9ecef; }
        .list-group-item.active { background-color: #e9ecef; color: #2c3e50; border-left: 4px solid #0d6efd; font-weight: bold; }
        .content-area { flex-grow: 1; padding: 20px; overflow-y: auto; background-color: #ecf0f3; }
        .video-player-wrapper { background-color: #000; width: 100%; max-width: 1000px; margin: 0 auto; aspect-ratio: 16/9; position: relative; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; }
        .live-badge { position: absolute; top: 20px; right: 20px; background-color: #dc3545; color: white; padding: 5px 12px; border-radius: 4px; font-size: 0.85rem; font-weight: bold; z-index: 10; animation: pulse 1.5s infinite; }
        .loading-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.9); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; transition: opacity 0.5s; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .cctv-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.1) 1px, transparent 1px, transparent 2px); pointer-events: none; z-index: 5; }
        .scanline { width: 100%; height: 80px; background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.15), transparent); position: absolute; animation: scan 4s linear infinite; pointer-events: none; z-index: 6; }
        .cctv-timestamp { position: absolute; bottom: 20px; left: 25px; color: rgba(255, 255, 255, 0.9); font-family: 'Courier New', Courier, monospace; font-size: 1.2rem; font-weight: bold; text-shadow: 2px 2px 2px #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; z-index: 7; }
        @keyframes scan { 0% { top: -100px; } 100% { top: 100%; } }
        @media (max-width: 768px) { body { height: auto; min-height: 100vh; overflow-y: auto; } .main-container { flex-direction: column; overflow: visible; } .sidebar { width: 100%; height: auto; max-height: 250px; border-right: none; border-bottom: 5px solid #dee2e6; order: 0; } .content-area { width: 100%; overflow: visible; padding: 15px; order: 1; } .video-player-wrapper { border-radius: 4px; } .cctv-timestamp { font-size: 0.9rem; bottom: 10px; left: 10px; } }
    </style>
</head>
<body>

<div class="header-section shadow-sm">
    <div class="container-fluid px-4">
        <div class="row align-items-center">
            <div class="col-md-6 col-12">
                <h4 class="m-0"><i class="fas fa-video me-2"></i>即時影像監控</h4>
            </div>
            <div class="col-md-6 col-12 text-md-end d-none d-md-block">
                <span class="badge bg-light text-dark"><i class="fas fa-user-clock me-1"></i>系統時間: <span id="sysTime">Loading...</span></span>
            </div>
        </div>
    </div>
</div>

<div class="main-container">
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="input-group input-group-sm">
                <span class="input-group-text"><i class="fas fa-search"></i></span>
                <input type="text" class="form-control" placeholder="搜尋設備 ID...">
            </div>
        </div>
        <div class="list-group-scroll">
            <div class="camera-group-title">LOCA_68000_2026_0001 (新屋區)</div>
            <button class="list-group-item list-group-item-action active" onclick="loadCamera('台61北向入口(新屋區) - 車頭', 'LOCA_68000_2026_0001_Front_01', this)">
                <i class="fas fa-truck-front me-2 text-success"></i>Front_01 <small class="text-muted">(車頭)</small>
            </button>
            <button class="list-group-item list-group-item-action" onclick="loadCamera('台61北向入口(新屋區) - 車斗', 'LOCA_68000_2026_0001_Bed_01', this)">
                <i class="fas fa-box-open me-2 text-success"></i>Bed_01 <small class="text-muted">(車斗)</small>
            </button>
            <button class="list-group-item list-group-item-action" onclick="loadCamera('台61北向入口(新屋區) - 車尾', 'LOCA_68000_2026_0001_Rear_01', this)">
                <i class="fas fa-truck-moving me-2 text-secondary"></i>Rear_01 <small class="text-muted">(車尾/離線)</small>
            </button>
            
            <div class="camera-group-title">LOCA_68000_2026_0002 (觀音區)</div>
            <button class="list-group-item list-group-item-action" onclick="loadCamera('台61南向入口(觀音區) - 車頭', 'LOCA_68000_2026_0002_Front_01', this)">
                <i class="fas fa-truck-front me-2 text-success"></i>Front_01 <small class="text-muted">(車頭)</small>
            </button>
            <button class="list-group-item list-group-item-action" onclick="loadCamera('台61南向入口(觀音區) - 車斗', 'LOCA_68000_2026_0002_Bed_01', this)">
                <i class="fas fa-box-open me-2 text-success"></i>Bed_01 <small class="text-muted">(車斗)</small>
            </button>
            <button class="list-group-item list-group-item-action" onclick="loadCamera('台61南向入口(觀音區) - 車尾', 'LOCA_68000_2026_0002_Rear_01', this)">
                <i class="fas fa-truck-moving me-2 text-success"></i>Rear_01 <small class="text-muted">(車尾)</small>
            </button>

            <div class="camera-group-title">LOCA_68000_2026_0003 (大園區)</div>
            <button class="list-group-item list-group-item-action" onclick="loadCamera('台61北向入口(大園區) - 車頭', 'LOCA_68000_2026_0003_Front_01', this)">
                <i class="fas fa-truck-front me-2 text-success"></i>Front_01 <small class="text-muted">(車頭)</small>
            </button>
            <button class="list-group-item list-group-item-action" onclick="loadCamera('台61北向入口(大園區) - 車斗', 'LOCA_68000_2026_0003_Bed_01', this)">
                <i class="fas fa-box-open me-2 text-success"></i>Bed_01 <small class="text-muted">(車斗)</small>
            </button>
            <button class="list-group-item list-group-item-action" onclick="loadCamera('台61北向入口(大園區) - 車尾', 'LOCA_68000_2026_0003_Rear_01', this)">
                <i class="fas fa-truck-moving me-2 text-success"></i>Rear_01 <small class="text-muted">(車尾)</small>
            </button>
        </div>
    </div>

    <div class="content-area">
        <div class="container-fluid p-0" style="max-width: 1200px; margin: 0 auto;">
            
            <div class="mb-3">
                <h5 class="fw-bold m-0 text-dark" id="currentCamTitle"><i class="fas fa-camera me-2"></i>台61北向入口(新屋區) - 車頭</h5>
                <small class="text-muted">設備編號: <span class="font-monospace" id="currentCamID">LOCA_68000_2026_0001_Front_01</span></small>
            </div>

            <div class="video-player-wrapper">
                <div class="live-badge"><i class="fas fa-circle me-1"></i>LIVE</div>
                
                <div class="loading-overlay" id="loadingOverlay" style="opacity: 0; pointer-events: none;">
                    <i class="fas fa-spinner fa-spin fa-3x mb-3 text-primary"></i>
                    <h5>正在連接影像串流...</h5>
                </div>

                <video id="liveStreamVideo" autoplay loop muted playsinline style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; transition: opacity 0.3s;">
                    <source src="demo_video.mp4" type="video/mp4">
                </video>

                <div class="cctv-overlay"></div>
                <div class="scanline"></div>
                <div class="cctv-timestamp" id="cctvTime">Loading...</div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function pad(num) { return num.toString().padStart(2, '0'); }

    setInterval(() => {
        const now = new Date();
        const dateStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
        const timeStr = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
        
        document.getElementById('sysTime').innerText = `${dateStr} ${timeStr}`;
        const camId = document.getElementById('currentCamID').innerText;
        document.getElementById('cctvTime').innerText = `${camId}  ${dateStr} ${timeStr}`;
    }, 1000);

    function loadCamera(name, id, element) {
        document.getElementById('currentCamTitle').innerHTML = `<i class="fas fa-camera me-2"></i>${name}`;
        document.getElementById('currentCamID').innerText = id;
        
        document.querySelectorAll('.list-group-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active');

        const overlay = document.getElementById('loadingOverlay');
        const videoElement = document.getElementById('liveStreamVideo');
        
        overlay.style.opacity = '1';
        
        if (name.includes('離線') || id.includes('Rear_01') && name.includes('新屋區')) {
            setTimeout(() => {
                overlay.innerHTML = `<i class="fas fa-video-slash fa-3x mb-3 text-danger"></i><h5 class="text-danger">設備已離線</h5>`;
                videoElement.style.opacity = '0';
            }, 800);
            return;
        }

        overlay.innerHTML = `<i class="fas fa-spinner fa-spin fa-3x mb-3 text-primary"></i><h5>正在連接影像串流...</h5>`;
        videoElement.style.opacity = '1';
        videoElement.currentTime = 0;
        videoElement.play();
        
        setTimeout(() => { overlay.style.opacity = '0'; }, 1500);
    }
</script>
</body>
</html>
