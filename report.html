<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>屏東縣非法棄置智慧圍籬系統 - 報表管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; }
        .header-section { background-color: #2c3e50; color: white; padding: 20px 0; margin-bottom: 20px; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: none; margin-bottom: 20px; }
        .nav-tabs .nav-link { color: #495057; font-weight: bold; padding: 12px 20px; }
        .nav-tabs .nav-link.active { color: #0d6efd; border-top: 3px solid #0d6efd; border-bottom-color: transparent; }
        .rank-badge { width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold; color: white; }
        .rank-1 { background-color: #ffc107; box-shadow: 0 0 10px rgba(255, 193, 7, 0.5); }
        .rank-2 { background-color: #adb5bd; }
        .rank-3 { background-color: #cd7f32; }
        .rank-other { background-color: #6c757d; font-size: 0.8em; width: 25px; height: 25px; }
        .clickable-number { cursor: pointer; text-decoration: underline; color: #0d6efd; font-weight: bold; }
        .clickable-number:hover { color: #0a58ca; }
    </style>
</head>
<body>

<div class="header-section">
    <div class="container">
        <h2 class="m-0"><i class="fas fa-chart-line me-2"></i>屏東縣非法棄置智慧圍籬系統</h2>
        <p class="m-0 text-white-50">統計報表與數據分析中心</p>
    </div>
</div>

<div class="container mb-5">
    <ul class="nav nav-tabs mb-4" id="reportTabs">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#content-recog"><i class="fas fa-camera me-1"></i> 當月辨識結果統計</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#content-upload"><i class="fas fa-cloud-upload-alt me-1"></i> 上傳車牌統計 (含明細)</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#content-blacklist"><i class="fas fa-list-ol me-1"></i> 當月黑名單排行</button></li>
    </ul>

    <div class="tab-content" id="reportTabContent">
        
        <div class="tab-pane fade show active" id="content-recog">
            <div class="card p-4">
                <div class="row g-3 align-items-end">
                    <div class="col-md-3"><label class="form-label fw-bold">統計月份</label><input type="month" class="form-control" id="recogMonth"></div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">地點名稱</label>
                        <select class="form-select" id="recogLoc">
                            <option value="">所有地點</option>
                            <option value="國道10號里港交流道">國道10號里港交流道(里港鄉)</option>
                            <option value="建國路與大溪路口">建國路與大溪路口(屏東市)</option>
                            <option value="沿山公路(高樹段)">沿山公路(高樹段)(高樹鄉)</option>
                            <option value="國道3號屏東交流道">國道3號屏東交流道南下出口端(長治鄉)</option>
                            <option value="沿山公路(獅頭庄水農場)">沿山公路(獅頭庄水農場)(新埤鄉)</option>
                        </select>
                    </div>
                    <div class="col-md-2"><label class="form-label fw-bold">辨識結果篩選</label><select class="form-select" id="recogStatus"><option value="all">全部 (成功+失敗)</option><option value="success">僅顯示成功</option><option value="fail">僅顯示失敗</option></select></div>
                    <div class="col-md-3 text-end"><button class="btn btn-primary" onclick="renderRecogTable()"><i class="fas fa-search me-1"></i> 查詢</button></div>
                </div>
            </div>

            <div class="card">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover table-striped mb-0 align-middle text-center">
                            <thead class="table-light">
                                <tr><th>日期</th><th class="text-start">地點名稱</th><th>辨識總數</th><th class="text-success">辨識成功</th><th class="text-danger">辨識失敗</th><th style="width: 20%;">成功率</th></tr>
                            </thead>
                            <tbody id="recogTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="content-upload">
            <div class="card p-4">
                <div class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label class="form-label fw-bold">上傳時間區間</label>
                        <div class="input-group">
                            <input type="date" class="form-control" id="uploadStart">
                            <span class="input-group-text">~</span>
                            <input type="date" class="form-control" id="uploadEnd">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">上傳狀態</label>
                        <select class="form-select" id="uploadStatus"><option value="all">全部</option><option value="success">上傳成功</option><option value="fail">上傳失敗</option></select>
                    </div>
                    <div class="col-md-5 text-end"><button class="btn btn-primary" onclick="renderUploadTable()"><i class="fas fa-search me-1"></i> 查詢</button></div>
                </div>
            </div>

            <div class="card">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover table-bordered mb-0 align-middle text-center">
                            <thead class="table-light"><tr><th>日期</th><th>API 上傳狀態</th><th>案件數量 (筆)</th><th>操作</th></tr></thead>
                            <tbody id="uploadTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="content-blacklist">
            <div class="card p-4">
                <div class="row g-3 align-items-end">
                    <div class="col-md-3"><label class="form-label fw-bold">統計月份</label><input type="month" class="form-control" id="rankMonth"></div>
                    <div class="col-md-9 text-end"><button class="btn btn-primary" onclick="renderRankTable()"><i class="fas fa-trophy me-1"></i> 計算排行</button></div>
                </div>
            </div>

            <div class="card">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0 align-middle">
                            <thead class="table-light"><tr><th class="text-center" width="10%">排名</th><th width="20%">車牌號碼</th><th width="20%">車種/備註</th><th class="text-center" width="20%">當月出現次數</th><th width="30%">最近出沒地點</th></tr></thead>
                            <tbody id="rankTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header bg-light">
                <h5 class="modal-title"><i class="fas fa-list-alt me-2"></i>上傳明細清單</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-0">
                <table class="table table-striped mb-0 table-sm">
                    <thead class="table-light sticky-top">
                        <tr><th>時間</th><th>車牌</th><th>狀態</th><th>訊息</th></tr>
                    </thead>
                    <tbody id="detailModalBody"></tbody>
                </table>
            </div>
            <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">關閉</button></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const today = new Date();
        const yyyyMm = today.toISOString().slice(0, 7);
        document.getElementById('recogMonth').value = yyyyMm; 
        document.getElementById('rankMonth').value = yyyyMm;
        document.getElementById('uploadStart').value = "2026-06-03"; 
        document.getElementById('uploadEnd').value = "2026-06-06";
        
        renderRecogTable(); 
        renderUploadTable(); 
        renderRankTable();
    });

    function renderRecogTable() {
        const tbody = document.getElementById('recogTableBody'); tbody.innerHTML = '';
        const mockData = [
            { date: "2026-06-06", loc: "國道10號里港交流道(里港鄉)", total: 150, success: 145, fail: 5 },
            { date: "2026-06-05", loc: "建國路與大溪路口(屏東市)", total: 120, success: 110, fail: 10 },
            { date: "2026-06-04", loc: "沿山公路(高樹段)(高樹鄉)", total: 140, success: 138, fail: 2 },
            { date: "2026-06-03", loc: "國道3號屏東交流道南下出口端(長治鄉)", total: 90, success: 80, fail: 10 },
        ];
        mockData.forEach(item => {
            const rate = Math.round((item.success / item.total) * 100);
            let barColor = rate >= 90 ? 'bg-success' : (rate >= 70 ? 'bg-warning' : 'bg-danger');
            tbody.innerHTML += `<tr><td>${item.date}</td><td class="text-start">${item.loc}</td><td class="fw-bold">${item.total}</td><td class="text-success">${item.success}</td><td class="text-danger">${item.fail}</td><td><div class="d-flex align-items-center"><span class="me-2 small fw-bold">${rate}%</span><div class="progress flex-grow-1" style="height: 6px;"><div class="progress-bar ${barColor}" style="width: ${rate}%"></div></div></div></td></tr>`;
        });
    }

    function renderUploadTable() {
        const tbody = document.getElementById('uploadTableBody'); tbody.innerHTML = '';
        const mockUploadStats = [
            { date: "2026-06-06", status: "success", count: 255 }, 
            { date: "2026-06-05", status: "fail", count: 15 },
            { date: "2026-06-04", status: "success", count: 230 },
            { date: "2026-06-03", status: "success", count: 180 }
        ];
        
        const filterStatus = document.getElementById('uploadStatus').value;

        mockUploadStats.forEach(item => {
            if (filterStatus !== 'all' && item.status !== filterStatus) return;
            const badgeClass = item.status === 'success' ? 'bg-success' : 'bg-danger';
            const label = item.status === 'success' ? '上傳成功' : '上傳失敗';
            tbody.innerHTML += `<tr><td>${item.date}</td><td><span class="badge ${badgeClass}">${label}</span></td><td><span class="clickable-number" onclick="openDetailModal('${item.date}', '${item.status}')">${item.count}</span></td><td><button class="btn btn-sm btn-outline-secondary"><i class="fas fa-download"></i></button></td></tr>`;
        });
    }

    function renderRankTable() {
        const tbody = document.getElementById('rankTableBody'); tbody.innerHTML = '';
        const mockRank = [
            { plate: "KER-5379", type: "大貨車", count: 12, lastLoc: "國道10號里港交流道(里港鄉)" },
            { plate: "XYZ-8888", type: "小貨車", count: 9, lastLoc: "建國路與大溪路口(屏東市)" },
            { plate: "ABC-1234", type: "聯結車", count: 7, lastLoc: "沿山公路(高樹段)(高樹鄉)" }
        ];
        mockRank.forEach((item, index) => {
            const rank = index + 1;
            let rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-other';
            let icon = rank === 1 ? '<i class="fas fa-trophy text-warning me-1"></i>' : '';
            tbody.innerHTML += `<tr><td class="text-center"><span class="rank-badge ${rankClass}">${rank}</span></td><td class="fw-bold font-monospace text-primary">${icon}${item.plate}</td><td>${item.type}</td><td class="text-center fw-bold fs-5">${item.count}</td><td class="text-muted small">${item.lastLoc}</td></tr>`;
        });
    }

    function openDetailModal(date, status) {
        const modalBody = document.getElementById('detailModalBody');
        modalBody.innerHTML = '';
        const title = status === 'success' ? '上傳成功' : '上傳失敗';
        
        let rows = '';
        for(let i=1; i<=10; i++) {
            const time = `${date} 10:0${i}:00`;
            const plate = `ABC-${1000+i}`;
            const msg = status === 'success' ? '200 OK' : '500 Server Error';
            const color = status === 'success' ? 'text-success' : 'text-danger';
            rows += `<tr><td>${time}</td><td class="font-monospace fw-bold">${plate}</td><td class="${color}">${title}</td><td class="small text-muted">${msg}</td></tr>`;
        }
        modalBody.innerHTML = rows;
        new bootstrap.Modal(document.getElementById('detailModal')).show();
    }
</script>
</body>
</html>
