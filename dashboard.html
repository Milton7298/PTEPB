<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>屏東縣非法棄置智慧圍籬系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/leaflet.css" />
    <style>
        body { background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; padding: 20px; }
        .card-counter { box-shadow: 0 4px 8px rgba(0,0,0,0.1); border: none; border-radius: 10px; }
        .icon-box { font-size: 2.5rem; opacity: 0.3; }
        /* 強制 GIS 容器顯示 */
        #gisMap { width: 100%; height: 400px; display: block; background-color: #e9ecef; }
    </style>
</head>
<body>

    <h4 class="mb-4 fw-bold text-secondary"><i class="fas fa-tachometer-alt me-2"></i>屏東縣非法棄置智慧圍籬系統 - 運作儀表板</h4>

    <div class="row g-4 mb-4">
        <div class="col-md-3"><div class="card card-counter bg-primary text-white p-3"><div class="d-flex justify-content-between"><div><h6 class="text-uppercase">今日辨識總量</h6><h2 class="mb-0 fw-bold">1,245</h2></div><i class="fas fa-camera icon-box"></i></div></div></div>
        <div class="col-md-3"><div class="card card-counter bg-danger text-white p-3"><div class="d-flex justify-content-between"><div><h6 class="text-uppercase">黑名單告警</h6><h2 class="mb-0 fw-bold">3</h2></div><i class="fas fa-exclamation-triangle icon-box"></i></div></div></div>
        <div class="col-md-3"><div class="card card-counter bg-success text-white p-3"><div class="d-flex justify-content-between"><div><h6 class="text-uppercase">API 上傳成功率</h6><h2 class="mb-0 fw-bold">99.8%</h2></div><i class="fas fa-cloud-upload-alt icon-box"></i></div></div></div>
        <div class="col-md-3"><div class="card card-counter bg-warning text-dark p-3"><div class="d-flex justify-content-between"><div><h6 class="text-uppercase">設備在線率</h6><h2 class="mb-0 fw-bold">92%</h2></div><i class="fas fa-video icon-box"></i></div></div></div>
    </div>

    <div class="row g-4">
        <div class="col-md-8">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-header bg-white fw-bold py-3"><i class="fas fa-map-marked-alt me-2 text-primary"></i>即時違規熱點地圖 (屏東)</div>
                <div class="card-body p-0"><div id="gisMap"></div></div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-header bg-white fw-bold py-3"><i class="fas fa-list-ul me-2"></i>系統待辦事項</div>
                <div class="list-group list-group-flush">
                    <a href="#" class="list-group-item list-group-item-action py-3 bg-danger bg-opacity-10">
                        <h6 class="mb-1 fw-bold text-danger">待處理：人工校正</h6>
                        <small class="text-danger fw-bold">國道10號里港交流道(里港鄉)有一筆案件需確認。</small>
                    </a>
                    <a href="#" class="list-group-item list-group-item-action py-3">
                        <h6 class="mb-1 fw-bold text-dark">系統維護通知</h6>
                        <small class="text-muted">預計於本週五晚間進行資料庫備份作業。</small>
                    </a>
                    <a href="#" class="list-group-item list-group-item-action py-3">
                        <h6 class="mb-1 fw-bold text-dark">黑名單更新</h6>
                        <small class="text-muted">環保局已匯入本月份最新列管名單。</small>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/leaflet.js"></script>
    <script>
        window.addEventListener('load', () => {
            // 屏東縣座標中心 [22.6, 120.5]
            const map = L.map('gisMap').setView([22.6, 120.5], 10);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            const points = [
                { name: "國道10號里港交流道", coords: [22.7834, 120.4932] },
                { name: "建國路與大溪路口", coords: [22.6789, 120.4856] },
                { name: "沿山公路(高樹段)", coords: [22.8543, 120.6124] },
                { name: "國道3號屏東交流道", coords: [22.6950, 120.5400] },
                { name: "沿山公路(獅頭庄水農場)", coords: [22.5600, 120.5800] }
            ];

            points.forEach(p => {
                L.marker(p.coords).addTo(map).bindPopup(`<b>${p.name}</b>`);
            });

            // 解決白底的最強解：強制觸發重繪
            setTimeout(() => { map.invalidateSize(); }, 500);
        });
    </script>
</body>
</html>
