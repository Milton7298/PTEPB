<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <style>
        body { background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; padding: 20px; }
        .card-counter { box-shadow: 0 4px 8px rgba(0,0,0,0.1); border: none; border-radius: 10px; transition: .3s; }
        .card-counter:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .icon-box { font-size: 2.5rem; opacity: 0.3; }
        .h-custom { height: 100%; }
        
        /* GIS 地圖容器樣式 - 確保有絕對高度避免白畫面 */
        #gisMap {
            width: 100%;
            height: 400px; /* 給定明確高度 */
            min-height: 400px;
            background-color: #e9ecef; /* 載入前的底色 */
            border-bottom-left-radius: 0.375rem;
            border-bottom-right-radius: 0.375rem;
            z-index: 1;
        }

        /* 自訂 Popup 文字樣式 */
        .leaflet-popup-content { font-family: "Microsoft JhengHei", sans-serif; font-size: 14px; margin: 13px 19px; }
        .leaflet-popup-content b { font-size: 15px; }
    </style>
</head>
<body>

    <h4 class="mb-4 fw-bold text-secondary"><i class="fas fa-tachometer-alt me-2"></i>系統運作儀表板 (Dashboard)</h4>

    <div class="row g-4 mb-4">
        <div class="col-md-3">
            <div class="card card-counter bg-primary text-white h-custom p-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-uppercase mb-1">今日辨識總量</h6>
                        <h2 class="mb-0 fw-bold">1,245</h2>
                        <small>較昨日 +5%</small>
                    </div>
                    <i class="fas fa-camera icon-box"></i>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card card-counter bg-danger text-white h-custom p-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-uppercase mb-1">黑名單告警</h6>
                        <h2 class="mb-0 fw-bold">3</h2>
                        <small>未處理案件</small>
                    </div>
                    <i class="fas fa-exclamation-triangle icon-box"></i>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card card-counter bg-success text-white h-custom p-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-uppercase mb-1">API 上傳成功率</h6>
                        <h2 class="mb-0 fw-bold">99.8%</h2>
                        <small>正常運作中</small>
                    </div>
                    <i class="fas fa-cloud-upload-alt icon-box"></i>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card card-counter bg-warning text-dark h-custom p-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-uppercase mb-1">設備在線率</h6>
                        <h2 class="mb-0 fw-bold">92%</h2>
                        <small>2 支攝影機離線</small>
                    </div>
                    <i class="fas fa-video icon-box"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-8">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-header bg-white fw-bold py-3 d-flex justify-content-between align-items-center">
                    <span><i class="fas fa-map-marked-alt me-2 text-primary"></i>最新違規熱點地圖 (即時連線)</span>
                    <span class="badge bg-success"><i class="fas fa-wifi me-1"></i>GIS 已連線</span>
                </div>
                <div class="card-body p-0">
                    <div id="gisMap"></div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-header bg-white fw-bold py-3"><i class="fas fa-list-ul me-2"></i>待辦事項 / 系統公告</div>
                <div class="list-group list-group-flush">
                    <a href="#" class="list-group-item list-group-item-action py-3 bg-danger bg-opacity-10">
                        <div class="d-flex w-100 justify-content-between">
                            <h6 class="mb-1 fw-bold text-danger">待處理：人工校正</h6>
                            <small class="text-danger fw-bold">3 分鐘前</small>
                        </div>
                        <p class="mb-1 small text-dark">大園區有 1 筆無法辨識案件需確認。</p>
                    </a>
                    <a href="#" class="list-group-item list-group-item-action py-3">
                        <div class="d-flex w-100 justify-content-between">
                            <h6 class="mb-1 fw-bold text-dark">系統維護通知</h6>
                            <small class="text-muted">2023/11/30</small>
                        </div>
                        <p class="mb-1 small text-muted">預計於本週五晚間進行資料庫備份作業。</p>
                    </a>
                    <a href="#" class="list-group-item list-group-item-action py-3">
                        <div class="d-flex w-100 justify-content-between">
                            <h6 class="mb-1 fw-bold text-dark">黑名單更新</h6>
                            <small class="text-muted">2023/11/27</small>
                        </div>
                        <p class="mb-1 small text-muted">環保局已匯入本月份最新列管名單。</p>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            try {
                // 初始化地圖，中心點抓取桃園沿海的平均位置
                const map = L.map('gisMap').setView([25.02, 121.10], 11);

                // 載入 OpenStreetMap 圖資
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
                }).addTo(map);

                // 自訂圖示 (利用開源圖庫，避免預設 icon 破圖)
                const greenIcon = new L.Icon({
                    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
                    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                    iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
                });

                const redIcon = new L.Icon({
                    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
                    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                    iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
                });

                // 標記 1：新屋區 (正常)
                L.marker([24.9723, 121.0145], {icon: greenIcon}).addTo(map)
                    .bindPopup('<b class="text-primary">台61北向入口(新屋區)</b><br><span class="font-monospace text-muted small">LOCA_68000_2026_0001</span><br><span class="badge bg-success mt-1">設備連線正常</span>');

                // 標記 2：觀音區 (正常)
                L.marker([25.0334, 121.0789], {icon: greenIcon}).addTo(map)
                    .bindPopup('<b class="text-primary">台61南向入口(觀音區)</b><br><span class="font-monospace text-muted small">LOCA_68000_2026_0002</span><br><span class="badge bg-success mt-1">設備連線正常</span>');

                // 標記 3：大園區 (異常，需人工校正)
                L.marker([25.0645, 121.1973], {icon: redIcon}).addTo(map)
                    .bindPopup('<b class="text-danger">台61北向入口(大園區)</b><br><span class="font-monospace text-muted small">LOCA_68000_2026_0003</span><br><span class="badge bg-danger mt-1"><i class="fas fa-exclamation-triangle me-1"></i>需人工校正</span>')
                    .openPopup(); // 預設開啟大園區的警告 Popup

                // 【強制重繪機制】解決 iframe 導致的白畫面問題
                // 使用多個時間點觸發，確保各種網路載入速度下都能成功渲染
                const fixMapRender = () => {
                    if (map) { map.invalidateSize(); }
                };
                setTimeout(fixMapRender, 100);
                setTimeout(fixMapRender, 500);
                setTimeout(fixMapRender, 1500);

                // 視窗大小改變時也重新計算
                window.addEventListener('resize', fixMapRender);

            } catch (error) {
                console.error("GIS Map Loading Error: ", error);
                document.getElementById('gisMap').innerHTML = '<div class="d-flex justify-content-center align-items-center h-100 text-danger"><i class="fas fa-exclamation-triangle me-2"></i>地圖模組載入失敗，請確認網路連線。</div>';
            }
        });
    </script>
</body>
</html>
