<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>屏東縣非法棄置智慧圍籬系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <style>
        body { background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; padding: 20px; }
        .card-counter { box-shadow: 0 4px 8px rgba(0,0,0,0.1); border: none; border-radius: 10px; transition: .3s; }
        .card-counter:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .icon-box { font-size: 2.5rem; opacity: 0.3; }
        .h-custom { height: 100%; }
        
        /* GIS 地圖容器 - 強制設定高度與背景 */
        #gisMap {
            width: 100%;
            height: 400px;
            background-color: #e9ecef;
            border-bottom-left-radius: 0.375rem;
            border-bottom-right-radius: 0.375rem;
            z-index: 1;
        }
    </style>
</head>
<body>

    <h4 class="mb-4 fw-bold text-secondary"><i class="fas fa-tachometer-alt me-2"></i>系統運作儀表板 (Dashboard)</h4>

    <div class="row g-4 mb-4">
        <div class="col-md-3">
            <div class="card card-counter bg-primary text-white h-custom p-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-uppercase mb-1">今日辨識總量</h6>
                        <h2 class="mb-0 fw-bold">1,245</h2>
                        <small>較昨日 +5%</small>
                    </div>
                    <i class="fas fa-camera icon-box"></i>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card card-counter bg-danger text-white h-custom p-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-uppercase mb-1">黑名單告警</h6>
                        <h2 class="mb-0 fw-bold">3</h2>
                        <small>未處理案件</small>
                    </div>
                    <i class="fas fa-exclamation-triangle icon-box"></i>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card card-counter bg-success text-white h-custom p-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-uppercase mb-1">API 上傳成功率</h6>
                        <h2 class="mb-0 fw-bold">99.8%</h2>
                        <small>正常運作中</small>
                    </div>
                    <i class="fas fa-cloud-upload-alt icon-box"></i>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card card-counter bg-warning text-dark h-custom p-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-uppercase mb-1">設備在線率</h6>
                        <h2 class="mb-0 fw-bold">92%</h2>
                        <small>2 支攝影機離線</small>
                    </div>
                    <i class="fas fa-video icon-box"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-8">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-header bg-white fw-bold py-3 d-flex justify-content-between align-items-center">
                    <span><i class="fas fa-map-marked-alt me-2 text-primary"></i>最新違規熱點地圖 (屏東縣)</span>
                    <span class="badge bg-success"><i class="fas fa-wifi me-1"></i>GIS 已連線</span>
                </div>
                <div class="card-body p-0">
                    <div id="gisMap"></div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-header bg-white fw-bold py-3"><i class="fas fa-list-ul me-2"></i>系統待辦事項</div>
                <div class="list-group list-group-flush">
                    <a href="#" class="list-group-item list-group-item-action py-3 bg-danger bg-opacity-10">
                        <h6 class="mb-1 fw-bold text-danger">待處理：人工校正</h6>
                        <small class="text-danger fw-bold">國道10號里港交流道(里港鄉)有一筆案件需確認。</small>
                    </a>
                    <a href="#" class="list-group-item list-group-item-action py-3">
                        <h6 class="mb-1 fw-bold text-dark">系統維護通知</h6>
                        <small class="text-muted">預計於本週五晚間進行資料庫備份作業。</small>
                    </a>
                    <a href="#" class="list-group-item list-group-item-action py-3">
                        <h6 class="mb-1 fw-bold text-dark">黑名單更新</h6>
                        <small class="text-muted">環保局已匯入本月份最新列管名單。</small>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script>
        window.addEventListener('load', () => {
            // 初始化地圖，中心設定為屏東縣經緯度 [22.6, 120.5]
            const map = L.map('gisMap').setView([22.6, 120.5], 10);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            // 自訂圖示
            const greenIcon = new L.Icon({
                iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
                shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
            });

            // 屏東縣 5 個監控點位
            const points = [
                { name: "國道10號里港交流道(里港鄉)", coords: [22.7834, 120.4932] },
                { name: "建國路與大溪路口(屏東市)", coords: [22.6789, 120.4856] },
                { name: "沿山公路(高樹段)(高樹鄉)", coords: [22.8543, 120.6124] },
                { name: "國道3號屏東交流道南下出口端(長治鄉)", coords: [22.6950, 120.5400] },
                { name: "沿山公路(獅頭庄水農場)(新埤鄉)", coords: [22.5600, 120.5800] }
            ];

            points.forEach(p => {
                L.marker(p.coords, {icon: greenIcon}).addTo(map)
                 .bindPopup(`<b>${p.name}</b>`);
            });

            // 確保容器正確渲染
            setTimeout(() => { map.invalidateSize(); }, 500);
        });
    </script>
</body>
</html>
